kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# DRA is GA in 1.34 — no feature gate needed, but keep it explicit for clarity.
featureGates:
  DynamicResourceAllocation: true

nodes:
  - role: control-plane
  - role: worker
    labels:
      # Driver DaemonSet nodeSelector targets this label.
      feature.node.kubernetes.io/cxi: "true"
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            feature-gates: "DynamicResourceAllocation=true"

# Enable CDI in containerd on all nodes.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri"]
      enable_cdi = true
      cdi_spec_dirs = ["/var/run/cdi"]
